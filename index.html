<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asilo Yolanda</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #f4f6f9;
  margin: 0;
}

/* NAV */
nav {
  background-color: #2c3e50;
  padding: 15px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 20px;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s;
}

nav a:hover {
  color: #1abc9c;
}

/* SECCIONES */
section {
  background: white;
  margin: 25px;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h2 {
  color: #2c3e50;
  margin-bottom: 15px;
}

/* GALERÍA */
.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.gallery-container img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery-container img:hover {
  transform: scale(1.08);
  box-shadow: 0 12px 25px rgba(0,0,0,0.25);
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  z-index: 999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* MAPA */
iframe {
  width: 100%;
  border-radius: 12px;
  border: none;
}
</style>

</head>

<body>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Nosotros</a>
  <a href="#">Servicios</a>
  <a href="#">Contacto</a>
</nav>

<section>
  <h2>Galería</h2>

  <div class="gallery-container">
    <img src="foto1.jpeg" onclick="abrirModal(this.src)">
    <img src="foto2.jpeg" onclick="abrirModal(this.src)">
    <img src="foto3.jpeg" onclick="abrirModal(this.src)">
    <img src="asillo1.jpeg" onclick="abrirModal(this.src)">
    <img src="asilo2.jpeg" onclick="abrirModal(this.src)">
    <img src="asilo3.jpeg" onclick="abrirModal(this.src)">
  </div>
</section>

<!-- MODAL -->
<div id="modal" onclick="cerrarModal()">
  <img id="imagenGrande">
</div>

<section>
  <h2>Ubicación</h2>
  <p>Jiutepec, Morelos Centro</p>

  <iframe 
    src="https://www.google.com/maps?q=Jiutepec,Morelos&output=embed" 
    height="300">
  </iframe>

  <p>📞 5535010844</p>
  <p>✉️ secretariaamericalatina26@gmail.com</p>
</section>

<script>
function abrirModal(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imagenGrande").src = src;
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
