<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asilo Yolanda</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

/* NAVBAR */
nav {
  background: #2c5d8a;
  padding: 15px;
  text-align: center;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

/* SECCIONES */
section {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}

/* GALERÍA */
.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
}

.gallery-container img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery-container img:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  z-index: 999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

</style>
</head>

<body>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Nosotros</a>
  <a href="#">Servicios</a>
  <a href="#">Contacto</a>
</nav>

<section>
  <h2>Galería</h2>

  <div class="gallery-container">
    <img src="foto1.jpeg" onclick="abrirModal(this.src)">
    <img src="foto2.jpeg" onclick="abrirModal(this.src)">
    <img src="foto3.jpeg" onclick="abrirModal(this.src)">
    <img src="asilo1.jpeg" onclick="abrirModal(this.src)">
    <img src="asilo2.jpeg" onclick="abrirModal(this.src)">
    <img src="asilo3.jpeg" onclick="abrirModal(this.src)">
  </div>
</section>

<!-- MODAL -->
<div id="modal" onclick="cerrarModal()">
  <img id="imagenGrande">
</div>

<section>
  <h2>Ubicación</h2>
  <p>Jiutepec, Morelos Centro</p>

  <iframe 
    src="https://www.google.com/maps?q=Jiutepec,Morelos&output=embed"
    width="100%" height="300" style="border:0;">
  </iframe>

  <p>📞 5535010844</p>
  <p>✉️ secretariaamericalatina26@gmail.com</p>
</section>

<script>
function abrirModal(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imagenGrande").src = src;
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
