<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albergue Yolanda Vargas Dulché A.C.</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #F4F7F6;
    color: #2C2C2C;
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    background: #2F5D50;
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #6FAF9B, #2F5D50);
    color: white;
    text-align: center;
    padding: 120px 20px 60px;
}

/* LOGO IMPACTANTE */
header img {
    width: 220px;
    border-radius: 50%;
    margin-top: -80px;
    background: white;
    padding: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    
    animation: aparecer 1s ease;
    transition: transform 0.3s;
}

header img:hover {
    transform: scale(1.1);
}

/* ANIMACIÓN */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(-40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
